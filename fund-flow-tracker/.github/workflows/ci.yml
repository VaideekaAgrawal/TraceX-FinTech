name: TraceX CI

on:
  push:
    branches: [main, productionize/*]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: fund-flow-tracker
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        working-directory: fund-flow-tracker
        run: |
          python -m pytest tests/ -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fund-flow-tracker/frontend/package-lock.json

      - name: Install dependencies
        working-directory: fund-flow-tracker/frontend
        run: npm ci

      - name: Lint
        working-directory: fund-flow-tracker/frontend
        run: npm run lint || true

      - name: Type check
        working-directory: fund-flow-tracker/frontend
        run: npx tsc --noEmit || true

  build-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fund-flow-tracker/frontend/package-lock.json

      - name: Build frontend
        working-directory: fund-flow-tracker/frontend
        run: |
          npm ci
          npm run build || true
